<!DOCTYPE html>
<html lang="pt-BR">
    <head>
      <meta charset="UTF-8" />
      <meta name="viewport" content="width=device-width, initial-scale=1.0" />
      <title>Meu Orçamento Diário</title>
      <script src="https://cdn.tailwindcss.com"></script>
      <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://gstatic.com" crossorigin>
        <link href="https://googleapis.com" rel="stylesheet">

    </head>
    <body class="bg-slate-900 text-slate-100 flex items-center justify-center min-h-screen p-4">
          
            <div class="bg-slate-800 p-6 rounded-2xl shadow-xl max-w-md w-full border border-slate-700">
                    <h1 class="text-2xl font-bold text-center mb-6 text-emerald-400">💰 Controle Diário</h1>
                
                    <!-- Seção de Configuração Inicial -->
                    <div class="space-y-4 mb-6 pb-6 border-b border-slate-700">
                        <div>
                            <label class="block text-xs font-semibold uppercase tracking-wider text-slate-400 mb-1">Cash Total Disponível (R$)</label>
                            <input type="number" id="cashTotal" value="1800" class="w-full bg-slate-700 border border-slate-600 rounded-lg px-3 py-2 text-white focus:outline-none focus:border-emerald-500" />
                        </div>
                    <div>
                    <label class="block text-xs font-semibold uppercase tracking-wider text-slate-400 mb-1">Meta Diária Alimentação (R$)</label>
                    <input type="number" id="metaDiaria" value="70" class="w-full bg-slate-700 border border-slate-600 rounded-lg px-3 py-2 text-white focus:outline-none focus:border-emerald-500" />
              
            </div>
    
            <!-- Bloco de Dias Restantes -->
            <div class="bg-blue-50 border border-blue-200 rounded-2xl p-4 text-center my-6 shadow-sm">
                <div class="text-slate-800 font-semibold text-lg">
                    Dias restantes: <span id="dias-restantes" class="text-blue-600 font-bold text-2xl">--</span>
                </div>
            </div>
    
              
            <!-- Seção de Lançamento de Gasto -->
            <div class="bg-slate-850 p-4 rounded-xl border border-slate-700 mb-6">
                  <h2 class="text-sm font-bold uppercase tracking-wider text-slate-400 mb-3">Registrar Gasto de Hoje</h2>
                  <div class="flex gap-2">
                        <input type="number" id="gastoHoje" placeholder="Quanto gastou hoje?" class="flex-1 bg-slate-700 border border-slate-600 rounded-lg px-3 py-2 text-white focus:outline-none focus:border-emerald-500" />
                        <button id="btnRegistrar" class="bg-emerald-600 hover:bg-emerald-700 font-medium px-4 py-2 rounded-lg transition">Registrar</button>
                  </div>
            </div>
      
            <!-- Painel de Resultados -->
            <div class="grid grid-cols-2 gap-4">
                  <div class="bg-slate-700/50 p-3 rounded-lg border border-slate-600">
                        <span class="block text-xs text-slate-400 font-medium">Disponível para Amanhã</span>
                        <span id="saldoAmanha" class="text-xl font-bold text-white">R$ 0,00</span>
                  </div>
                  <div class="bg-slate-700/50 p-3 rounded-lg border border-slate-600">
                        <span class="block text-xs text-slate-400 font-medium">Cash Total Restante</span>
                        <span id="cashRestante" class="text-xl font-bold text-white">R$ 0,00</span>
                  </div>
            </div>
      
            <script src="app.js" defer></script>
    </body>
</html>
