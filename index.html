<!DOCTYPE html>
<html lang="pt-br">
	<head>
		<!-- Configurações de App (PWA) -->
		<meta name="apple-mobile-web-app-capable" content="yes">
		<meta name="mobile-web-app-capable" content="yes">
		<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

		<!-- Manifest Simplificado (Simula o F11) -->
		<link rel="manifest" href="manifest.json">
		<meta name="theme-color" content="#2563eb">

		<meta charset="UTF-8">
		<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
		<title>Meu Orçamento Diário</title>

		<!-- Tailwind e Google Fonts -->
		<script src="https://cdn.tailwindcss.com"></script>
		<link href="https://googleapis.com" rel="stylesheet">

		<script>
		if ("serviceWorker" in navigator) {
		  navigator.serviceWorker.register("sw.js");
		}
		</script>
		  
		<style>
			body { font-family: 'Inter', sans-serif; }
			.aba-ativa {
			  border-bottom: 3px solid #2563eb;
			  color: #2563eb;
			  font-weight: 700;
			}
			.botao-grande { min-height: 64px; }
		</style>
	</head>

	<!-- <body class="bg-slate-100 flex justify-center min-h-screen"> -->
	<body class="bg-slate-900 text-slate-100 flex items-center justify-center min-h-screen p-2">
  		<!-- <div class="w-full max-w-md bg-white shadow-2xl flex flex-col rounded-none sm:rounded-3xl overflow-hidden"> -->
    	<div class="bg-slate-800 p-6 rounded-2xl shadow-xl max-w-md w-full border border-slate-700">
			<!-- ABAS -->
			<div class="flex border-b bg-slate-400 rounded-2xl sticky top-0 z-10">
				<button onclick="mudarAba(-1)" id="tab-1"
					class="flex-1 py-4 text-white text-xs uppercase tracking-wider transition">
					Anterior
				</button>
				<button onclick="mudarAba(0)" id="tab0"
					class="flex-1 py-4 aba-ativa text-xs uppercase tracking-wider transition">
					Este Mês
				</button>
				<button onclick="mudarAba(1)" id="tab1"
					class="flex-1 py-4 text-white text-xs uppercase tracking-wider transition">
					Próximo
				</button>
			</div>
    		<div class="p-6 flex-1">
				<!-- TOTAL -->
				<div class="bg-slate-700 text-white rounded-2xl p-8 mb-8 shadow-xl">
		  			<div class="text-sm opacity-75 uppercase tracking-wider mb-2 flex items-center gap-2">
					    <span>Saldo atual: <span id="montanteInicial">R$ 0,00</span></span>
					    
					    <!-- Input escondido que será usado apenas para abrir o teclado numérico com decimal -->
					    <input type="number" id="inputDecimalEscondido" step="0.01" class="hidden w-20 bg-transparent border-b border-white focus:outline-none" />
					
					    <button id="btnEditarMontante" class="cursor-pointer hover:opacity-100 opacity-60 transition-opacity">
					        <svg xmlns="http://w3.org" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-4 h-4">
					            <path stroke-linecap="round" stroke-linejoin="round" d="m16.862 4.487 1.687-1.688a1.875 1.875 0 1 1 2.652 2.652L10.582 16.07a4.5 4.5 0 0 1-1.897 1.13L6 18l.8-2.685a4.5 4.5 0 0 1 1.13-1.897l8.932-8.931Zm0 0L19.5 7.125M18 14v4.75A2.25 2.25 0 0 1 15.75 21H5.25A2.25 2.25 0 0 1 3 18.75V8.25A2.25 2.25 0 0 1 5.25 6H10" />
					        </svg>
					    </button>
					</div>

		  			<div 
		       			class="text-lg font-extrabold leading-none">
						Meta do dia: 
		    			<span id="displayTotal"> R$ 0,00 </span>
		  			</div>
					<!-- Bloco de Dias Restantes -->
		            <div class="bg-blue-50 border border-blue-200 rounded-2xl py-2 text-center my-3 shadow-sm">
		                <div class="text-slate-800 font-semibold text-lg">
		                    Dias restantes: <span id="dias-restantes" class="text-blue-600 font-bold text-lg">--</span>
		                </div>
		            </div>
		  			<div id="nomeMes"
		       			class="text-base mt-3 opacity-90 font-medium">
		    				MAIO 2026
		  			</div>
	  			</div>
				<!-- BOTÃO VOZ -->
				<button onclick="iniciarMicrofone()"
					class="w-full
						 bg-gradient-to-r
						 from-sky-400
						 via-blue-500
						 to-violet-600
						 hover:brightness-110
						 text-white
						 rounded-2xl
						 botao-grande
						 mb-8
						 flex items-center justify-center gap-3
						 shadow-lg shadow-blue-500/30
						 active:scale-95
						 transition-all">
					<span class="text-xl font-semibold">+ ADICIONAR GASTO</span>
					<span class="text-2xl">🎤</span>
				</button>

				<!-- LISTA -->
				<div id="listaGastos" class="space-y-4 pb-24"></div>

    		</div>
  		</div>

		<script>
			
			const btnEditar = document.getElementById('btnEditarMontante');
			const inputDecimal = document.getElementById('inputDecimalEscondido');
			const textoMontante = document.getElementById('montanteInicial');
			const txtDiasRestantes = document.getElementById('dias-restantes');
			
			let abaAtual = 0;
			let gastos = JSON.parse(localStorage.getItem("gastos_pro")) || [];

			document.addEventListener('DOMContentLoaded', () => {
			    // 1. Busca o montante salvo na gaveta independente
			    let montanteSalvo = localStorage.getItem('montanteInicialSalvo');
			    // 2. Se ele existir, coloca na tela formatado como moeda
			    if (montanteSalvo) {
			        textoMontante.textContent = parseFloat(montanteSalvo).toLocaleString('pt-BR', {
			            style: 'currency',
			            currency: 'BRL'
			        });
			    }
			    // 3. Roda o cálculo dos dias restantes
			    calcularDiasRestantes();
			});


			// Função para calcular os dias restantes (Corrigida sem o listener interno)
			function calcularDiasRestantes() {
				const hoje = new Date();
				const anoAtual = hoje.getFullYear();
				const mesAtual = hoje.getMonth(); 
				const ultimoDiaDoMes = new Date(anoAtual, mesAtual + 1, 0).getDate();
				const diasRestantes = ultimoDiaDoMes - hoje.getDate();
				
				if (txtDiasRestantes) {
				  	txtDiasRestantes.innerText = diasRestantes;
				}
			return diasRestantes; 
			}
	
			function getMesReferencia(offset) {
				const d = new Date();
				d.setMonth(d.getMonth() + offset);
				const meses = ["JANEIRO","FEVEREIRO","MARÇO","ABRIL","MAIO","JUNHO","JULHO","AGOSTO","SETEMBRO","OUTUBRO","NOVEMBRO","DEZEMBRO"];
				return `${meses[d.getMonth()]} ${d.getFullYear()}`;
			}

		    function mudarAba(index) {
		      abaAtual = index;
		      document.querySelectorAll('[id^="tab"]').forEach(el =>
		        el.classList.remove('aba-ativa','text-slate-900'));
		      document.getElementById('tab' + index).classList.add('aba-ativa');
		      renderizar();
		    }

			btnEditar.addEventListener('click', () => {
			    // Exibe o input e foca nele (abrindo o teclado numérico com ponto/vírgula no celular)
			    inputDecimal.classList.remove('hidden');
			    inputDecimal.focus();
			});
		
			// Quando o usuário terminar de digitar e clicar fora (ou der enter)
			inputDecimal.addEventListener('blur', () => {
			    let valorDigitado = parseFloat(inputDecimal.value);
			    
			    if (!isNaN(valorDigitado)) {
			        // Formata o valor digitado COM decimais na tela
			        textoMontante.textContent = valorDigitado.toLocaleString('pt-BR', {
			            style: 'currency',
			            currency: 'BRL'
			        });
			
			        // 🌟 NOVA LINHA: Salva o número puro digitado no LocalStorage
			        localStorage.setItem('montanteInicialSalvo', valorDigitado);
			    }
			
			    // Esconde o input novamente
			    inputDecimal.classList.add('hidden');
			    inputDecimal.value = ''; 
			});

			// Permite salvar também apertando a tecla Enter
			inputDecimal.addEventListener('keydown', (e) => {
			    if (e.key === 'Enter') {
			        inputDecimal.blur(); // Dispara o evento 'blur' acima
			    }
			});


		    function renderizar() {
				
				const container = document.getElementById('listaGastos');
				const displayTotal = document.getElementById('displayTotal');
				const nomeMesDisplay = document.getElementById('nomeMes');
				const mesNome = getMesReferencia(abaAtual);
		
				nomeMesDisplay.innerText = mesNome;
				container.innerHTML = "";
				let total = 0;

				const gastosFiltrados = gastos.filter(g => g.mesRef === mesNome);
		
				if (gastosFiltrados.length === 0) {
					container.innerHTML =
					`<div class="text-center text-slate-300 py-12 italic">
						Sem gastos em ${mesNome.toLowerCase()}
					</div>`;
				}

				// Rodando cada gasto do mês selecionado
				gastosFiltrados.forEach(item => {
					total += item.valor;
					const divContainerGasto = document.createElement('div');
					divContainerGasto.className = "flex flex-col border-b border-slate-100 py-1";
					divContainerGasto.innerHTML = `
						<!-- LINHA PRINCIPAL -->
						<div class="flex items-center justify-between px-3 h-8 w-full">
							<span class="text-right font-bold text-slate-700 min-w-[20px]">${item.dia}</span>
							<p>&nbsp</p>

							<!-- NOME (50%) -->
							<div class="w-[50%] text-[20px] font-semibold text-slate-800 truncate text-left leading-none">
								${item.nome.charAt(0).toUpperCase() + item.nome.slice(1).toLowerCase()}
							</div>

							<!-- VALOR (30%) -->
							<div class="w-[30%] text-right text-[16px] font-bold text-slate-700 leading-none">
								R$ ${item.valor.toFixed(2)}
							</div>
							<p>&nbsp</p>

							<!-- AÇÕES (20%) -->
							<div class="w-[20%] flex justify-end gap-1 items-center">
								<!-- A Seta só aparece se houver mais de 1 detalhe cadastrado -->
								${item.detalhes && item.detalhes.length > 1 ? `
								<button class="btn-seta
								               w-6 h-6
								               flex items-center justify-center
								               rounded-full
								               bg-blue-600
								               text-white
								               text-[11px]
								               shadow-sm
								               transition-all">
								  ▼
								</button>
								` : '<div class="w-[24px]"></div>'}
					
								<button onclick="excluirItem(${item.id})"
									  class="w-5 h-5 flex items-center justify-center
									         rounded-full
									         border border-slate-300
									         text-slate-500
									         text-xs font-bold
									         bg-red-500
									         text-white
									         border-red-500
									         transition-all">
									  X
									</button>
							</div>
						</div>

						<!-- SUBLISTA DE DETALHES -->
						<div class="sublista-detalhes hidden pl-12 pb-2 pt-1 text-sm text-slate-500 flex flex-col gap-1">
							${item.detalhes ? item.detalhes.map(d => `
							<div class="flex justify-between w-[75%] border-l-2 border-slate-200 pl-2">
								<span>↳ Lançamento (Dia ${d.dia})</span>
								<span class="font-semibold">R$ ${d.valor.toFixed(2)}</span>
							</div>
							`).join('') : ''}
						</div>
						`;

						// CORREÇÃO 3: Agora conseguimos achar a seta e a sublista deste item específico
						const botaoSeta = divContainerGasto.querySelector('.btn-seta');
						const sublista = divContainerGasto.querySelector('.sublista-detalhes');

						if (botaoSeta) {
						  botaoSeta.addEventListener('click', () => {
							const estaEscondido = sublista.classList.contains('hidden');
							if (estaEscondido) {
							  sublista.classList.remove('hidden');
							  botaoSeta.textContent = '▲';
							} else {
							  sublista.classList.add('hidden');
							  botaoSeta.textContent = '▼';
							}
						});
    				}

				  	// Adiciona o bloco completo configurado dentro da sua lista real na tela
				    container.appendChild(divContainerGasto);
				  }); // <--- Fechamento existente do forEach

				  // 🌟 NOVA LÓGICA DA META DIÁRIA 🌟
				  
				  // 1. Busca o montante inicial puro (gaveta independente) ou assume 0 se estiver vazio
				  const montanteOriginal = parseFloat(localStorage.getItem('montanteInicialSalvo')) || 0;
				  
				  // 2. Descobre quantos dias faltam usando a função que você já tem pronta
				  const diasQueFaltam = calcularDiasRestantes();
				  
				  // 3. Calcula o saldo que ainda sobrou para o mês
				  const saldoDisponivel = montanteOriginal - total;
				  
				  // 4. Calcula a meta do dia (Evita divisão por zero se o mês estiver no último dia)
				  let metaDiaria = 0;
				  if (diasQueFaltam > 0) {
				      metaDiaria = saldoDisponivel / diasQueFaltam;
				  } else {
				      metaDiaria = saldoDisponivel; // Se for o último dia, a meta é tudo o que sobrou
				  }
				  
				  // 5. Se a meta ficar negativa (gastou mais que o montante), zera para não ficar feio
				  if (metaDiaria < 0) metaDiaria = 0;

				  // 6. Atualiza o display principal com o valor da meta diária recalculada
				  displayTotal.innerText = `R$ ${metaDiaria.toLocaleString('pt-BR', {minimumFractionDigits: 2, maximumFractionDigits: 2})}`;
				
				  localStorage.setItem("gastos_pro", JSON.stringify(gastos));
			} // <--- Fechamento existente da função renderizar



  function incluirPorTexto(texto) {

	  const resultado = extrairNomeValor(texto);
	  
	  if (!resultado.valor) return alert("Diga o valor claramente.");
	
		const nome = resultado.nome
	  	let valor;
	  	valor = resultado.valor
		const tudoCerto = confirm(`
			Nome: ${nome}
			Valor: ${valor}
		
			Está correto?
		`);
		if (tudoCerto) {
			  const mesRefAtual = getMesReferencia(abaAtual);
			  const indexExistente = gastos.findIndex(g => 
			    g.nome.toLowerCase() === nome.toLowerCase() && 
			    g.mesRef === mesRefAtual
			  );
		
			  let valorFinal = valor;
			  
			if (indexExistente !== -1) {
			
				gastos[indexExistente].valor += valor;
			
				if (!gastos[indexExistente].detalhes) {
				
				    gastos[indexExistente].detalhes = [{
				        idLancamento: gastos[indexExistente].id,
				        valor: gastos[indexExistente].valor,
				        dia: gastos[indexExistente].dia
				    }];
				
				}

				gastos[indexExistente].detalhes.push({
					idLancamento: Date.now(),
					valor: valor,
					dia: new Date().getDate()
				});
			
			} else {

		
				  gastos.unshift({
					  id: Date.now(),
					  nome: nome,
					  valor: valor, // Seu valor total inicial
					  dia: new Date().getDate(),
					  mesRef: mesRefAtual,
			  
					  // Aqui entra a sua nova sublista "detalhes"
					  detalhes: [
					    { 
					      idLancamento: Date.now(), 
					      valor: valor,          // Usa a mesma variável do valor acima
					      dia: new Date().getDate()  // Usa o mesmo dia do gasto principal
					    }
					  ]
					});
				}
		  	renderizar();
		}
	}

    function iniciarMicrofone() {
      const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
      if (!SR) return alert("Navegador incompatível.");
      const r = new SR();
      r.lang = "pt-BR";
      r.onresult = e => incluirPorTexto(e.results[0][0].transcript);
      r.start();
    }

    function excluirItem(id) {
      if (confirm("Excluir este gasto?")) {
        gastos = gastos.filter(i => i.id !== id);
        renderizar();
      }
    }
	  
	function extrairNomeValor(frase) {
	    // 1. Limpa a frase (remove palavras e o "R$")
	    const limpa = frase.replace(/\b(reais|centavos|e)\b|r\s?\$/gi, '').trim();
	
	    // 2. Extrai os números DA FRASE LIMPA
	    const numeros = limpa.match(/\d+/g);
	    
	    let reais = 0;
	    let centavos = 0;
	    if (numeros) {
	        reais = parseInt(numeros[0], 10);
	        centavos = numeros.length > 1 ? parseInt(numeros[1], 10) : 0;
	    }
	
	    // 3. Extrai o nome DA FRASE LIMPA (e não da original!)
	    const matchNome = limpa.match(/^([^\d]*)/); // ✅ Agora usa "limpa"
	    const nome = matchNome ? matchNome[0].trim() : '';
	
	    const valor = reais + centavos / 100;
	    return { nome, valor };
	}

    function editarValor(id) {
      const novo = prompt("Novo valor:");
      if (novo) {
        gastos = gastos.map(i =>
          i.id === id ? {...i, valor: parseFloat(novo.replace(",",".")) || 0} : i
        );
        renderizar();
      }
    }

    renderizar();
  </script>

</body>
</html>
